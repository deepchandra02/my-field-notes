name: Deploy Pages

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout main (production source)
        uses: actions/checkout@v4
        with:
          ref: main
          path: prod-src

      - name: Checkout dev (staging source)
        uses: actions/checkout@v4
        with:
          ref: dev
          path: staging-src

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: prod-src/package-lock.json

      - name: Build production
        working-directory: prod-src
        env:
          VITE_BASE: /my-field-notes/
        run: |
          npm ci
          npm run build
          cp dist/index.html dist/404.html

      - name: Build staging
        working-directory: staging-src
        env:
          VITE_BASE: /my-field-notes/staging/
        run: |
          npm ci
          npm run build
          cp dist/index.html dist/404.html

      - name: Assemble combined site
        run: |
          mkdir -p site
          cp -r prod-src/dist/. site/
          mkdir -p site/staging
          cp -r staging-src/dist/. site/staging/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
